name: llm-dashboard

services:
  app:
    build: .
    container_name: llm-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # API keys for live-data refresh (LLM Stats, Artificial Analysis).
    # Kept out of the image via .dockerignore; injected at runtime instead.
    env_file:
      - .env.local
    restart: unless-stopped
